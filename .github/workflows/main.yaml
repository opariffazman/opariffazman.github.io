name: Render and Deploy index.html

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone main repo
        run: |
          git clone https://github.com/opariffazman/opariffazman.git source

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./source
        run: npm install

      - name: Generate all outputs
        working-directory: ./source
        run: node index.js

      - name: Copy generated files to root
        run: |
          cp source/index.html index.html
          cp source/badges.svg badges.svg
          cp source/links-pro.svg links-pro.svg
          cp source/links-social.svg links-social.svg
          cp source/opariffazman.png opariffazman.png
          cp source/og-image.svg og-image.svg

      - name: Commit and push
        uses: test-room-7/action-update-file@v2.0.0
        with:
          file-path: |
            index.html
            badges.svg
            links-pro.svg
            links-social.svg
            opariffazman.png
            og-image.svg
          commit-msg: "chore: update page content [skip ci]"
          github-token: ${{ secrets.GITHUB_TOKEN }}
